# =============================================================================
# Per-worktree app service. One instance per worktree.
#
# Usage (from .worktree/ directory):
#   docker compose up -d --build
#   docker compose exec app zsh
#   docker compose down
#
# DO NOT EDIT the volume mounts, labels, environment, extra_hosts, or networks
# sections — they are part of the container-wt template engine.
#
# CUSTOMIZE: Change the loadbalancer port (default 3000) to match your app.
# CUSTOMIZE: Add shared build cache volumes (see commented examples at bottom).
# =============================================================================

name: ${PROJECT_NAME}-${BRANCH_NAME}

services:
  base:
    image: "${PROJECT_NAME}-dev-base:local"
    build:
      context: ..
      dockerfile: .worktree/Dockerfile.base

  app:
    build:
      context: ..
      dockerfile: .worktree/Dockerfile.app
      additional_contexts:
        devbase: "service:base"
    tty: true
    stdin_open: true
    container_name: "app-${PROJECT_NAME}-${WORKTREE_NAME}"

    # -------------------------------------------------------------------------
    # DO NOT EDIT — container-wt core volume mounts
    # -------------------------------------------------------------------------
    volumes:
      # Mount the worktree at the conventional /workspaces path
      - ${LOCAL_WORKSPACE_FOLDER}:/workspaces/${WORKTREE_NAME}:cached
      # Mount the git common directory at the same absolute host path so
      # .git file references (absolute paths) remain valid inside the container
      - ${GIT_COMMON_DIR}:${GIT_COMMON_DIR}:cached

    # -------------------------------------------------------------------------
    # DO NOT EDIT — container-wt core labels (Traefik routing + metadata)
    # Except: change the loadbalancer port if your app uses a different port.
    # -------------------------------------------------------------------------
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}-${WORKTREE_NAME}.rule=Host(`${BRANCH_NAME}.${PROJECT_NAME}.localhost`)"
      - "traefik.http.routers.${PROJECT_NAME}-${WORKTREE_NAME}.entrypoints=web"
      # CUSTOMIZE: Change 3000 to your app's port
      - "traefik.http.services.${PROJECT_NAME}-${WORKTREE_NAME}.loadbalancer.server.port=3000"
      - "container-wt=true"
      - "container-wt.project=${PROJECT_NAME}"
      - "container-wt.worktree=${WORKTREE_NAME}"
      - "container-wt.worktree-dir=${LOCAL_WORKSPACE_FOLDER}"
      - "container-wt.branch=${BRANCH_NAME}"

    # -------------------------------------------------------------------------
    # DO NOT EDIT — container-wt core environment
    # -------------------------------------------------------------------------
    env_file:
      - .env.app
    environment:
      - WORKTREE_NAME=${WORKTREE_NAME}
      - BRANCH_NAME=${BRANCH_NAME}
      - PROJECT_NAME=${PROJECT_NAME}
      - MAIN_REPO_NAME=${MAIN_REPO_NAME}
    extra_hosts:
      - "${BRANCH_NAME}.${PROJECT_NAME}.localhost:host-gateway"
    working_dir: /workspaces/${WORKTREE_NAME}
    networks:
      - devnet

# =============================================================================
# CUSTOMIZE — Shared build caches (uncomment and adapt for your stack).
# Named volumes with a fixed `name:` are shared across all worktree containers.
# Share the package manager CACHE, not node_modules (platform-specific binaries).
# =============================================================================
#
#     # Add these under the `app.volumes` section above:
#     # - npm-cache:/home/node/.npm
#     # - go-mod-cache:/go/pkg/mod
#     # - pip-cache:/home/vscode/.cache/pip
#
# volumes:
#   npm-cache:
#     name: "${PROJECT_NAME}-npm-cache"
#   go-mod-cache:
#     name: "${PROJECT_NAME}-go-mod-cache"
#   pip-cache:
#     name: "${PROJECT_NAME}-pip-cache"

# ---------------------------------------------------------------------------
# DO NOT EDIT — container-wt networking
# ---------------------------------------------------------------------------
networks:
  devnet:
    external: true
    name: ${NETWORK_NAME}
